name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: pyinstaller capiheater.spec

      - name: Verify .exe exists and is valid
        run: |
          if (!(Test-Path "dist\CapiHeater.exe")) { throw "Build failed - .exe not found" }
          $size = (Get-Item "dist\CapiHeater.exe").Length / 1MB
          Write-Host "CapiHeater.exe size: $([math]::Round($size, 2)) MB"
          if ($size -lt 5) { throw "Build suspicious - exe too small ($([math]::Round($size, 2)) MB)" }

      - name: Verify critical DLLs are bundled
        run: python ci/verify_exe.py dist/CapiHeater.exe

      - name: Upload .exe as Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CapiHeater.exe
          generate_release_notes: true
