name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller (onedir)
        run: pyinstaller capiheater.spec

      - name: Verify build
        run: |
          if (!(Test-Path "dist\CapiHeater\CapiHeater.exe")) { throw "Build failed" }
          $size = (Get-Item "dist\CapiHeater\CapiHeater.exe").Length / 1MB
          Write-Host "CapiHeater.exe size: $([math]::Round($size, 2)) MB"
          $fileCount = (Get-ChildItem "dist\CapiHeater" -Recurse | Measure-Object).Count
          Write-Host "Total files in dist: $fileCount"
          # Verify python311.dll is right next to the exe
          if (!(Test-Path "dist\CapiHeater\python311.dll")) {
            Write-Host "WARNING: python311.dll not found next to exe!"
            Get-ChildItem "dist\CapiHeater\python3*.dll"
          } else {
            $dllSize = (Get-Item "dist\CapiHeater\python311.dll").Length / 1MB
            Write-Host "python311.dll: $([math]::Round($dllSize, 2)) MB - OK"
          }

      - name: Create zip archive
        run: Compress-Archive -Path "dist\CapiHeater\*" -DestinationPath "dist\CapiHeater.zip" -Force

      - name: Upload zip as Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CapiHeater.zip
          generate_release_notes: true
